<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>Ellingsruter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    header h1 {
      font-size: 1.75rem;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }
    .departures {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .departure-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .departure-card.imminent {
      border-color: #f59e0b;
    }
    .line-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 44px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 1rem;
      color: #0f172a;
      flex-shrink: 0;
    }
    .departure-info {
      flex: 1;
    }
    .departure-destination {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
    }
    .departure-time {
      text-align: right;
      flex-shrink: 0;
    }
    .departure-time .time {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f8fafc;
    }
    .departure-time.imminent .time {
      color: #f59e0b;
    }
    .departure-time .relative {
      font-size: 0.7rem;
      color: #64748b;
      margin-top: 0.125rem;
    }
    .departure-time.imminent .relative {
      color: #f59e0b;
      font-weight: 600;
    }
    .refresh-info {
      text-align: center;
      font-size: 0.7rem;
      color: #475569;
      margin-top: 1.5rem;
    }
    .error {
      background: #451a1a;
      border: 1px solid #991b1b;
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      color: #fca5a5;
    }
    .loading {
      text-align: center;
      font-size: 1rem;
      color: #64748b;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ellingsrudåsen</h1>
      <p class="subtitle">Neste avganger</p>
    </header>
    <div class="departures">
      <!--DEPARTURES-->
    </div>
    <p class="refresh-info"><!--REFRESH_INFO--></p>
  </div>
</body>
</html>
