<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>Ellingsruter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif', 'Palatino', 'Georgia', serif;
      background: #ffffff;
      color: #000000;
      font-size: 16px;
      line-height: 1.4;
      padding: 24px 12px 0 12px;
      overflow: hidden;
    }
    .container {
      max-width: 576px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 24px;
      border-bottom: 2px solid #000000;
      margin-right: 12px;
    }
    header h1 {
      font-size: 30px;
      font-weight: bold;
      color: #000000;
    }
    .subtitle {
      font-size: 20px;
      color: #333333;
      margin-top: 6px;
    }
    .departures {
      padding: 4px 0;
    }
    .departure-card {
      background: #ffffff;
      border: 1px solid #000000;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      margin-right: 12px;
    }
    .departure-row {
      display: table;
      width: 100%;
    }
    .line-badge {
      display: table-cell;
      width: 56px;
      height: 56px;
      text-align: center;
      vertical-align: middle;
      font-weight: bold;
      font-size: 30px;
      font-family: 'Helvetica', 'Arial', sans-serif;
      background: #000000;
      color: #ffffff;
      padding-right: 24px;
      padding-left: 24px;
      border-radius: 6px;
    }
    .departure-info {
      display: table-cell;
      vertical-align: middle;
      width: 100%;
    }
    .departure-destination {
      font-size: 30px;
      font-weight: bold;
      color: #000000;
      padding-left: 28px;
    }
    .departure-time-inner {
      display: inline;
      white-space: nowrap;
    }
    .departure-time {
      display: table-cell;
      text-align: right;
      vertical-align: middle;
      width: 90px;
      padding-right: 20px;
    }
    .departure-time .time {
      font-size: 28px;
      font-weight: bold;
      color: #000000;
      display: inline;
    }

    .departure-time .separator {
      font-size: 30px;
      color: #999999;
      margin: 0 4px;
      display: inline;
    }
    .departure-time .relative {
      font-size: 30px;
      color: #333333;
      display: inline;
    }

    .refresh-info {
      text-align: center;
      font-size: 20px;
      color: #666666;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #cccccc;
    }
    .error {
      background: #f0f0f0;
      border: 1px solid #000000;
      padding: 12px;
      text-align: center;
      color: #000000;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ellingsrudåsen</h1>
      <p class="subtitle">Neste avganger</p>
    </header>
    <div class="departures">
      <!--DEPARTURES-->
    </div>
    <p class="refresh-info"><!--REFRESH_INFO--></p>
  </div>
</body>
</html>
